<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Film Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎬 My Film Library</h1>
    <p>My favourite movies collection</p>
  </header>

  <main>

    <div class="film-card">
      <img src="https://via.placeholder.com/150" alt="Film poster">
      <h2>Inception</h2>
      <p>⭐ Rating: 8.8</p>
      <button onclick="likeFilm(this)">❤️ Like</button>
    </div>

    <div class="film-card">
      <img src="https://via.placeholder.com/150" alt="Film poster">
      <h2>Interstellar</h2>
      <p>⭐ Rating: 8.6</p>
      <button onclick="likeFilm(this)">❤️ Like</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
